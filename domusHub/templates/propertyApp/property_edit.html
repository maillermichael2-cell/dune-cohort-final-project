{% extends 'base.html' %}

{% block content %}
<div class="agent-dashboard" style="margin-top: 60px;">
    <h1>Edit Property</h1>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <div class="agent-form">
        <form class="input-form" method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="createBtn" type="submit">Save changes</button>
        </form>
    </div>

    <a class="agentPropertyView" href="{% url 'agent_dashboard' %}">Back to property</a>
</div>
{% endblock %}
