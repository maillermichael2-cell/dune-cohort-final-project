{% extends 'base.html' %}

{% block content %}
<div class="property-delete-confirm" style="padding: 40px; max-width: 800px; margin: 0 auto;">
    <h1>Delete Property</h1>
    <p>Are you sure you want to delete <strong>{{ property.title }}</strong>?</p>
    <p>This action cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background-color: red; color: white; padding: 10px 16px; border: none; border-radius: 4px;">Yes, delete</button>
        <a href="{% url 'property_detail' property.pk %}" style="margin-left: 16px;">Cancel</a>
    </form>
</div>
{% endblock %}
